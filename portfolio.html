<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Portfolio</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1e1e1e;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 400px; /* mobile default */
      background: #2b2b2b;
      padding: 10px;
    }

    .title {
      text-align: center;
      margin-bottom: 15px;
    }

    .title span {
      border: 2px solid black;
      padding: 6px 25px;
      background: white;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .gallery {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      border-radius: 6px;
      object-fit: cover;
    }

    /* 💻 PC / Desktop view */
    @media (min-width: 768px) {
      .container {
        max-width: 900px;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr); /* 3 columns on PC */
        gap: 15px;
      }

      .gallery img {
        height: 200px;
      }
    }

    /* 📱 Small phones */
    @media (max-width: 480px) {
      .title span {
        font-size: 14px;
        padding: 5px 15px;
      }
    }

  </style>
</head>
